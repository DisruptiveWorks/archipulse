      summary: Capability tree — hierarchical capability breakdown
      operationId: getCapabilityTree
      responses:
        "200":
          description: Capability tree nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TreeNode"

  /api/v1/workspaces/{id}/views/application-dependency/graph:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: Application dependency graph
      operationId: getDependencyGraph
      responses:
