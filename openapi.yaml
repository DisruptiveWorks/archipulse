    get:
      tags: [relationships]
      summary: List relationships (paginated, viewer+)
      operationId: listRelationships
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated relationship list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipPage"
    post:
      tags: [relationships]
      summary: Create a relationship (editor+)
      operationId: createRelationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationshipInput"
      responses:
        "201":
          description: Relationship created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Relationship"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/workspaces/{wsID}/relationships/{id}:
    parameters:
      - $ref: "#/components/parameters/wsID"
      - $ref: "#/components/parameters/resourceId"
    get:
      tags: [relationships]
      summary: Get a relationship (viewer+)
      operationId: getRelationship
      responses:
        "200":
          description: Relationship
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Relationship"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [relationships]
      summary: Update a relationship (editor+)
      operationId: updateRelationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationshipUpdateInput"
      responses:
        "200":
          description: Updated relationship
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Relationship"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [relationships]
      summary: Delete a relationship (editor+)
      operationId: deleteRelationship
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Diagrams ─────────────────────────────────────────────────────────────────

  /api/v1/workspaces/{wsID}/diagrams:
    parameters:
      - $ref: "#/components/parameters/wsID"
    get:
      tags: [diagrams]
      summary: List diagrams (paginated, viewer+)
      operationId: listDiagrams
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated diagram list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagramPage"
    post:
      tags: [diagrams]
      summary: Create a diagram (editor+)
      operationId: createDiagram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagramInput"
      responses:
        "201":
          description: Diagram created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagram"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/workspaces/{wsID}/diagrams/{id}:
    parameters:
      - $ref: "#/components/parameters/wsID"
      - $ref: "#/components/parameters/resourceId"
    get:
      tags: [diagrams]
      summary: Get a diagram (viewer+)
      operationId: getDiagram
      responses:
        "200":
          description: Diagram
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagram"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [diagrams]
      summary: Update a diagram (editor+)
      operationId: updateDiagram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagramUpdateInput"
      responses:
        "200":
          description: Updated diagram
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagram"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [diagrams]
      summary: Delete a diagram (editor+)
      operationId: deleteDiagram
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces/{wsID}/diagrams/{id}/render:
    parameters:
      - $ref: "#/components/parameters/wsID"
      - $ref: "#/components/parameters/resourceId"
    get:
      tags: [diagrams]
      summary: Render a diagram (returns nodes and connections with layout data)
      operationId: renderDiagram
      responses:
        "200":
          description: Rendered diagram data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagramRender"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Folders ──────────────────────────────────────────────────────────────────

  /api/v1/workspaces/{id}/diagram-tree:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [folders]
      summary: Get the diagram folder tree (viewer+)
      operationId: getDiagramTree
      responses:
        "200":
          description: Nested folder/diagram tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FolderNode"

  # ── Saved Views ──────────────────────────────────────────────────────────────

  /api/v1/workspaces/{wsID}/saved-views:
    parameters:
      - $ref: "#/components/parameters/wsID"
    get:
      tags: [saved-views]
      summary: List saved views (paginated, viewer+)
      operationId: listSavedViews
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated saved-view list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedViewPage"
    post:
      tags: [saved-views]
      summary: Create a saved view (editor+)
      operationId: createSavedView
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedViewInput"
      responses:
        "201":
          description: Saved view created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/workspaces/{wsID}/saved-views/{svID}:
    parameters:
      - $ref: "#/components/parameters/wsID"
      - name: svID
        in: path
        required: true
        description: Saved view ID
        schema:
          type: string
          format: uuid
    get:
      tags: [saved-views]
      summary: Get a saved view (viewer+)
      operationId: getSavedView
      responses:
        "200":
          description: Saved view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [saved-views]
      summary: Update a saved view (editor+)
      operationId: updateSavedView
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedViewUpdateInput"
      responses:
        "200":
          description: Updated saved view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [saved-views]
      summary: Delete a saved view (editor+)
      operationId: deleteSavedView
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Viewers ──────────────────────────────────────────────────────────────────

  /api/v1/workspaces/{id}/views:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: List available automatic views for this workspace
      operationId: listViews
      responses:
        "200":
          description: Available view descriptors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ViewDescriptor"

  /api/v1/workspaces/{id}/views/{view}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - name: view
        in: path
        required: true
        description: View identifier (e.g. `capability-tree`)
        schema:
          type: string
    get:
      tags: [viewers]
      summary: Execute a named view (viewer+)
      operationId: getView
      responses:
        "200":
          description: View result (shape depends on the view type)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/workspaces/{id}/views/capability-tree/tree:
