  /api/v1/workspaces/{id}/views/process-application/matrix:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: Process-to-application mapping matrix
      operationId: getProcessApplicationMatrix
      responses:
        "200":
