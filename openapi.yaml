openapi: "3.1.0"

info:
  title: ArchiPulse API
  version: "1.0.0"
  description: |
    REST API for ArchiPulse — an ArchiMate 3.2 workspace management platform.

    **Authentication:** Cookie-based session (`ap_session`). Call `POST /api/v1/auth/login`
    to obtain a session cookie, then include it with every subsequent request.
    All `/api/v1/` endpoints except `/auth/login`, `/auth/logout`, `/auth/config`,
    `/auth/oidc`, and `/auth/oidc/callback` require an active session.

    **Pagination:** List endpoints accept `?page=N&limit=N` query params and return a
    `Page` envelope: `{"items":[...],"total":N,"page":N,"limit":N}`.
    Default limit: 100. Max limit: 500.

    **Optimistic concurrency:** `PUT` on mutable resources requires a `version` field
    matching the current version. A mismatch returns `409 Conflict`.

servers:
  - url: /
    description: Same-origin (default deployment)

tags:
  - name: system
    description: Health and liveness
  - name: auth
    description: Authentication and session management
  - name: users
    description: User lookup
  - name: workspaces
    description: Workspace management
  - name: members
    description: Workspace membership
  - name: elements
    description: ArchiMate elements
  - name: relationships
    description: ArchiMate relationships
  - name: diagrams
    description: Diagrams and rendering
  - name: folders
    description: Diagram folder tree
  - name: saved-views
    description: Persisted automatic-view filter states
  - name: viewers
    description: Automatic analytical views (read-only queries)
  - name: snapshots
    description: Point-in-time workspace snapshots
  - name: import-export
    description: AOEF (ArchiMate Open Exchange Format) import and export
  - name: events
    description: Workspace audit log

# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── System ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [system]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "1.2.0"

  # ── Auth ────────────────────────────────────────────────────────────────────

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Log in with email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful — session cookie is set
          headers:
            Set-Cookie:
              description: Session cookie (`ap_session`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh session — re-issues the cookie with a fresh TTL
      operationId: refreshSession
      description: |
        Requires an existing valid session cookie. Issues a new JWT with the same
        claims and a fresh TTL, replacing the current cookie. Intended for long-lived
        CLI sessions so the user does not need to re-authenticate periodically.
      responses:
        "200":
          description: Session refreshed — new cookie set
          headers:
            Set-Cookie:
              description: Refreshed session cookie (`ap_session`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Log out and clear session cookie
      operationId: logout
      security: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Get the current authenticated user
      operationId: getMe
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/config:
    get:
      tags: [auth]
      summary: Get authentication configuration (OIDC enabled, demo mode)
      operationId: getAuthConfig
      security: []
      responses:
        "200":
          description: Auth configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfig"

  /api/v1/auth/oidc:
    get:
      tags: [auth]
      summary: Initiate OIDC login (redirects to identity provider)
      operationId: oidcRedirect
      security: []
      responses:
        "302":
          description: Redirect to identity provider

  /api/v1/auth/oidc/callback:
    get:
      tags: [auth]
      summary: OIDC callback — exchanges code for session cookie
      operationId: oidcCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Login successful — redirects to `/` with session cookie set
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Users ───────────────────────────────────────────────────────────────────

  /api/v1/users/lookup:
    get:
      tags: [users]
      summary: Look up a user by email address
      operationId: lookupUser
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Workspaces ──────────────────────────────────────────────────────────────

  /api/v1/workspaces:
    get:
      tags: [workspaces]
      summary: List workspaces accessible to the current user
      operationId: listWorkspaces
      responses:
        "200":
          description: Workspace list (admins see all; others see only their own)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      tags: [workspaces]
      summary: Create a new workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceInput"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/workspaces/{id}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [workspaces]
      summary: Get a workspace by ID
      operationId: getWorkspace
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [workspaces]
      summary: Update a workspace (owner only)
      operationId: updateWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceUpdateInput"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [workspaces]
      summary: Delete a workspace (owner only)
      operationId: deleteWorkspace
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Members ─────────────────────────────────────────────────────────────────

  /api/v1/workspaces/{id}/members:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [members]
      summary: List workspace members (viewer+)
      operationId: listMembers
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
    post:
      tags: [members]
      summary: Add a member to the workspace (owner only)
      operationId: addMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberInput"
      responses:
        "204":
          description: Member added
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/workspaces/{id}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - name: userId
        in: path
        required: true
        schema:
          type: string
    put:
      tags: [members]
      summary: Update a member's role (owner only)
      operationId: updateMemberRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleInput"
      responses:
        "204":
          description: Role updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [members]
      summary: Remove a member from the workspace (owner only)
      operationId: removeMember
      responses:
        "204":
          description: Member removed
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Elements ─────────────────────────────────────────────────────────────────

  /api/v1/workspaces/{wsID}/elements:
    parameters:
      - $ref: "#/components/parameters/wsID"
    get:
      tags: [elements]
      summary: List elements (paginated, viewer+)
      operationId: listElements
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated element list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElementPage"
    post:
      tags: [elements]
      summary: Create an element (editor+)
      operationId: createElement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ElementInput"
      responses:
        "201":
          description: Element created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Element"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/workspaces/{wsID}/elements/{id}:
    parameters:
      - $ref: "#/components/parameters/wsID"
      - $ref: "#/components/parameters/resourceId"
    get:
      tags: [elements]
      summary: Get an element with its properties (viewer+)
      operationId: getElement
      responses:
        "200":
          description: Element with properties grouped by source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElementDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [elements]
      summary: Update an element (editor+)
      operationId: updateElement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ElementUpdateInput"
      responses:
        "200":
          description: Updated element
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Element"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [elements]
      summary: Delete an element (editor+)
      operationId: deleteElement
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Relationships ────────────────────────────────────────────────────────────

  /api/v1/workspaces/{wsID}/relationships:
    parameters:
