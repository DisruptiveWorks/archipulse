            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/workspaces/{id}/views/technology-stack/matrix:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: Technology stack matrix
      operationId: getTechnologyStackMatrix
      responses:
        "200":
          description: Technology stack matrix
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/workspaces/{id}/elements/{appID}/app-detail:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - name: appID
        in: path
        required: true
        description: Application element ID
        schema:
          type: string
          format: uuid
    get:
      tags: [viewers]
      summary: Application element detail (capabilities, dependencies, diagrams)
      operationId: getAppElementDetail
      responses:
        "200":
          description: Application detail
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Snapshots ────────────────────────────────────────────────────────────────

  /api/v1/workspaces/{id}/snapshots:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [snapshots]
      summary: List snapshots (paginated, viewer+)
      operationId: listSnapshots
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotPage"
    post:
      tags: [snapshots]
      summary: Create a snapshot of the current workspace state (editor+)
      operationId: createSnapshot
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  description: Optional human-readable label
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"

  /api/v1/workspaces/{id}/snapshots/{snapID}:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - name: snapID
        in: path
        required: true
        description: Snapshot ID
        schema:
          type: string
          format: uuid
    delete:
      tags: [snapshots]
      summary: Delete a snapshot (owner only)
      operationId: deleteSnapshot
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces/{id}/snapshots/{snapID}/restore:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
      - name: snapID
        in: path
        required: true
        description: Snapshot ID
        schema:
          type: string
          format: uuid
    post:
      tags: [snapshots]
      summary: Restore workspace to a snapshot (editor+)
      description: |
        Before restoring, an automatic snapshot of the current state is taken.
        The workspace is then replaced with the snapshot payload (AOEF XML).
      operationId: restoreSnapshot
      responses:
        "204":
          description: Restored successfully
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Import / Export ──────────────────────────────────────────────────────────

  /api/v1/workspaces/{id}/import:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    post:
      tags: [import-export]
      summary: Import an AOEF (.xml) file into the workspace (editor+)
      operationId: importModel
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: AOEF XML file (max 32 MB)
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: File could not be parsed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/workspaces/{id}/import/preview:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    post:
      tags: [import-export]
      summary: Preview an AOEF import (diff against current state, no changes written)
      operationId: previewImport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Preview diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreview"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          description: File could not be parsed

  /api/v1/workspaces/{id}/export/aoef:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [import-export]
      summary: Export workspace as AOEF XML (viewer+)
      operationId: exportAOEF
      responses:
        "200":
          description: AOEF XML file
          content:
            application/xml:
              schema:
                type: string
                format: binary

  # ── Events ───────────────────────────────────────────────────────────────────

  /api/v1/workspaces/{id}/events:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [events]
      summary: List workspace audit events (paginated, viewer+)
      operationId: listEvents
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated audit event list (newest first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPage"

# ─────────────────────────────────────────────────────────────────────────────
components:

  # ── Security ─────────────────────────────────────────────────────────────────

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ap_session

  # ── Parameters ───────────────────────────────────────────────────────────────

  parameters:
    workspaceId:
      name: id
      in: path
      required: true
      description: Workspace ID
      schema:
        type: string
        format: uuid

    wsID:
      name: wsID
      in: path
      required: true
      description: Workspace ID
      schema:
        type: string
        format: uuid

    resourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: string
        format: uuid

    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100

  # ── Responses ────────────────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient workspace role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Optimistic concurrency conflict — re-fetch and retry with updated version
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # ── Schemas ──────────────────────────────────────────────────────────────────

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    StatusOK:
      type: object
      properties:
        status:
          type: string
          example: ok

    # ── Auth ──

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        email:
          type: string
          format: email
        org_role:
          type: string
          enum: [admin, member]

    CurrentUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        org_role:
          type: string
          enum: [admin, member]

    AuthConfig:
      type: object
      properties:
        oidc_enabled:
          type: boolean
        demo_mode:
          type: boolean
        demo_email:
          type: string
          format: email
          description: Only present when demo_mode is true
        demo_password:
          type: string
          description: Only present when demo_mode is true

    # ── Users ──

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        org_role:
          type: string
          enum: [admin, member]
        created_at:
          type: string
          format: date-time

    # ── Workspaces ──

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        purpose:
          type: string
        description:
          type: string
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkspaceInput:
      type: object
      required: [name, purpose]
      properties:
        name:
          type: string
        purpose:
          type: string
        description:
          type: string

    WorkspaceUpdateInput:
      type: object
      required: [name, purpose, version]
      properties:
        name:
          type: string
        purpose:
          type: string
        description:
          type: string
        version:
          type: integer
          description: Current version for optimistic concurrency

    # ── Members ──

    WorkspaceMember:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [owner, editor, viewer]
        invited_by:
          type: string

    AddMemberInput:
      type: object
      required: [user_id, role]
      properties:
        user_id:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]

    UpdateRoleInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, editor, viewer]

    # ── Elements ──

    Element:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        source_id:
          type: string
          description: Original identifier from the import source (e.g. AOEF id)
        type:
          type: string
          description: ArchiMate 3.2 element type (e.g. ApplicationComponent, BusinessProcess)
        layer:
          type: string
          enum: [strategy, business, application, technology, physical, motivation, implementation, other]
        name:
          type: string
        documentation:
          type: string
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ElementDetail:
      type: object
      properties:
        element:
          $ref: "#/components/schemas/Element"
        properties:
          type: object
          description: Properties keyed by source name; each value is an array of Property objects
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/Property"

    Property:
      type: object
      properties:
        id:
          type: string
          format: uuid
        element_id:
          type: string
          format: uuid
        key:
          type: string
        value:
          type: string
        source:
          type: string
        collected_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ElementInput:
      type: object
      required: [source_id, type]
      properties:
        source_id:
          type: string
        type:
          type: string
          description: ArchiMate 3.2 element type
        name:
          type: string
        documentation:
          type: string

    ElementUpdateInput:
      type: object
      required: [type, version]
      properties:
        type:
          type: string
        name:
          type: string
        documentation:
          type: string
        version:
          type: integer

    ElementPage:
      $ref: "#/components/schemas/PageOfElement"

    PageOfElement:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Element"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Relationships ──

    Relationship:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        source_id:
          type: string
        type:
          type: string
          description: ArchiMate 3.2 relationship type (e.g. CompositionRelationship, ServingRelationship)
        source_element:
          type: string
          format: uuid
          description: ID of the source element
        target_element:
          type: string
          format: uuid
          description: ID of the target element
        name:
          type: string
        documentation:
          type: string
        access_type:
          type: string
          description: For AccessRelationship — read, write, readWrite, unspecified
        is_directed:
          type: boolean
        modifier:
          type: string
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RelationshipInput:
      type: object
      required: [source_id, type, source_element, target_element]
      properties:
        source_id:
          type: string
        type:
          type: string
        source_element:
          type: string
          format: uuid
        target_element:
          type: string
          format: uuid
        name:
          type: string
        documentation:
          type: string

    RelationshipUpdateInput:
      type: object
      required: [type, source_element, target_element, version]
      properties:
        type:
          type: string
        source_element:
          type: string
          format: uuid
        target_element:
          type: string
          format: uuid
        name:
          type: string
        documentation:
          type: string
        version:
          type: integer

    RelationshipPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Relationship"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Diagrams ──

    Diagram:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        source_id:
          type: string
        name:
          type: string
        documentation:
          type: string
        layout:
          type: object
          description: ArchiMate diagram layout data (JSON)
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DiagramInput:
      type: object
      required: [source_id]
      properties:
        source_id:
          type: string
        name:
          type: string
        documentation:
          type: string
        layout:
          type: object
          additionalProperties: true

    DiagramUpdateInput:
      type: object
      required: [version]
      properties:
        name:
          type: string
        documentation:
          type: string
        layout:
          type: object
          additionalProperties: true
        version:
          type: integer

    DiagramRender:
      type: object
      description: Resolved diagram with element and connection data for rendering
      additionalProperties: true

    DiagramPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Diagram"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Folders ──

    FolderNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [folder, diagram]
        children:
          type: array
          items:
            $ref: "#/components/schemas/FolderNode"

    # ── Saved Views ──

    SavedView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        view_type:
          type: string
          description: Identifies which automatic view this state belongs to
        name:
          type: string
        filters:
          type: object
          description: Arbitrary filter state for the view (JSON)
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SavedViewInput:
      type: object
      required: [view_type, name]
      properties:
        view_type:
          type: string
        name:
          type: string
        filters:
          type: object
          additionalProperties: true

    SavedViewUpdateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        filters:
          type: object
          additionalProperties: true

    SavedViewPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SavedView"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Viewers ──

    ViewDescriptor:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        layer:
          type: string

    TreeNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        children:
          type: array
          items:
            $ref: "#/components/schemas/TreeNode"

    Graph:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            additionalProperties: true
        edges:
          type: array
          items:
            type: object
            additionalProperties: true

    # ── Snapshots ──

    Snapshot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        label:
          type: string
        trigger:
          type: string
          enum: [manual, import, restore]
        user_id:
          type: string
        user_email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    SnapshotPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Snapshot"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Import / Export ──

    ImportResult:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        elements:
          type: integer
        relationships:
          type: integer
        diagrams:
          type: integer
        folders:
          type: integer
        property_definitions:
          type: integer

    ImportPreview:
      type: object
      description: Diff of what would change if the import were applied
      additionalProperties: true

    # ── Events ──

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        user_id:
          type: string
        user_email:
          type: string
          format: email
        action:
          type: string
          enum:
            - create
            - update
            - delete
            - import
            - add_member
            - remove_member
            - update_member_role
            - create_snapshot
            - restore_snapshot
        entity_type:
          type: string
          enum:
            - element
            - relationship
            - diagram
            - workspace
            - member
            - snapshot
            - saved_view
        entity_id:
          type: string
        entity_name:
          type: string
        meta:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    EventPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

# Global security: all operations require cookie auth unless overridden with security: []
security:
  - cookieAuth: []
