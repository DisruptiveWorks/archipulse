  /api/v1/workspaces/{id}/views/integration-map/graph:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: Integration map — application-to-application flows
      operationId: getIntegrationMap
      responses:
        "200":
          description: Integration map graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"

  /api/v1/workspaces/{id}/views/application-dashboard/stats:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: Application dashboard statistics
      operationId: getApplicationDashboard
      responses:
        "200":
          description: Aggregated statistics
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/workspaces/{id}/views/capability-landscape/map:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: Landscape by Capability — applications mapped to capabilities (hierarchical)
      operationId: getCapabilityLandscapeMap
      responses:
        "200":
          description: Capability landscape map
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/workspaces/{id}/views/application-landscape/map:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: Landscape by Domain — applications grouped by domain
      operationId: getApplicationLandscapeDomainMap
      responses:
        "200":
          description: Application landscape by domain
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/workspaces/{id}/views/application-catalogue/entries:
    parameters:
      - $ref: "#/components/parameters/workspaceId"
    get:
      tags: [viewers]
      summary: Application catalogue entries
      operationId: getAppCatalogueEntries
      responses:
        "200":
          description: Application catalogue
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /api/v1/workspaces/{id}/views/technology-catalogue/entries:
