<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 27,8 27,22 16,28 5,22 5,8' fill='%23E85D3A'/%3E%3Cpolygon points='16,9 22,13 22,21 16,25 10,21 10,13' fill='none' stroke='white' stroke-width='0.8' stroke-linejoin='round' opacity='0.4'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='white'/%3E%3Cline x1='16' y1='13.5' x2='16' y2='9' stroke='white' stroke-width='1' opacity='0.7'/%3E%3Cline x1='18' y1='14.5' x2='22' y2='13' stroke='white' stroke-width='1' opacity='0.7'/%3E%3Cline x1='18' y1='17.5' x2='22' y2='21' stroke='white' stroke-width='1' opacity='0.7'/%3E%3C/svg%3E" />
  <title>ArchiPulse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #13151f;
      --border:    #2a2d3e;
      --accent:    #E85D3A;
      --accent2:   #ff8c6b;
      --text:      #e2e4f0;
      --muted:     #8b8fa8;
      --danger:    #f87171;
      --success:   #4ade80;
      --sidebar-w: 240px;
      --nav-h:     52px;
      --font:      'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ─────────────────────────────────────────────────────────────────── */
    nav {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      gap: 12px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }
    .nav-logo {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
    }
    .nav-logo svg { display: block; }
    .nav-wordmark {
      font-family: 'Trebuchet MS', Arial, sans-serif;
      font-size: 17px;
      letter-spacing: -0.8px;
      line-height: 1;
      display: flex;
      align-items: baseline;
    }
    .w-archi { font-weight: 300; color: var(--text); }
    .w-pulse  { font-weight: 700; color: #E85D3A; }

    .nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; white-space: nowrap; }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb .sep { color: var(--border); }
    .breadcrumb .current { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .nav-spacer { flex: 1; }

    /* ── App shell ───────────────────────────────────────────────────────────── */
    .app-shell {
      display: flex;
      flex: 1;
      margin-top: var(--nav-h);
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: var(--nav-h);
      bottom: 0;
      left: 0;
      overflow-y: auto;
      z-index: 90;
    }

    .sidebar-ws-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-ws-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .purpose-badge {
      display: inline-block;
      background: #271810;
      color: var(--accent);
      border: 1px solid #4a2518;
      border-radius: 3px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .sidebar-section {
      padding: 12px 8px 4px;
    }
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 8px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      transition: background .12s, color .12s;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-item:hover { background: #1e2235; color: var(--text); }
    .sidebar-item.active {
      background: #2a1810;
      color: var(--accent);
      font-weight: 500;
    }
    .sidebar-item .si-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }

    .sidebar-layer-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-biz   { background: #e0af68; }
    .dot-app   { background: #7aa2f7; }
    .dot-tech  { background: #9ece6a; }
    .dot-cross { background: #8b8fa8; }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 8px;
      border-top: 1px solid var(--border);
    }

    /* ── Content area ────────────────────────────────────────────────────────── */
    .content {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 28px 32px;
      min-width: 0;
    }
    .content-full {
      flex: 1;
      padding: 32px 28px;
      max-width: 1080px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────────── */
    button, .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
      text-decoration: none;
      font-family: var(--font);
    }
    button:hover, .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-sidebar {
      width: 100%;
      justify-content: center;
      background: #271810;
      color: var(--accent);
      border: 1px solid #4a2518;
      border-radius: 6px;
      font-size: 12px;
    }
    .btn-sidebar:hover { background: #3a2015; opacity: 1; }

    /* ── Workspace home grid ─────────────────────────────────────────────────── */
    .ws-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .ws-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      cursor: pointer;
      transition: border-color .15s, transform .15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ws-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .ws-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .ws-card h2 { font-size: 15px; font-weight: 600; }
    .ws-card .desc { color: var(--muted); font-size: 13px; line-height: 1.5; flex: 1; }
    .ws-card .meta { color: var(--muted); font-size: 11px; padding-top: 8px; border-top: 1px solid var(--border); }

    /* ── Page header ─────────────────────────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }
    .page-header h1 { font-size: 18px; font-weight: 600; }
    .page-header .sub { color: var(--muted); font-size: 13px; margin-top: 3px; }

    /* ── Import drop zone ────────────────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 20px 16px;
      text-align: center;
      color: var(--muted);
      transition: border-color .15s, color .15s;
      cursor: pointer;
    }
    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      color: var(--text);
    }
    .drop-zone .dz-icon { font-size: 24px; margin-bottom: 6px; }
    .drop-zone p { font-size: 12px; }
    .drop-zone .hint { font-size: 11px; margin-top: 3px; color: var(--muted); opacity: .7; }

    /* ── Overview cards (workspace home panel) ───────────────────────────────── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .overview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .overview-card .ov-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .overview-card .ov-value { font-size: 24px; font-weight: 700; color: var(--text); }
    .overview-card .ov-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Table ───────────────────────────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1e2235; }
    tbody td { padding: 8px 14px; color: var(--text); }
    tbody td:empty::after { content: '—'; color: var(--muted); }

    /* ── Graph ───────────────────────────────────────────────────────────────── */
    #cy {
      width: 100%;
      height: calc(100vh - var(--nav-h) - 120px);
      min-height: 400px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    /* ── Tags ────────────────────────────────────────────────────────────────── */
    .tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .tag-app  { background: #1e2f55; color: #7aa2f7; }
    .tag-biz  { background: #2a2414; color: #e0af68; }
    .tag-tech { background: #1a2a1a; color: #9ece6a; }
    .tag-mot  { background: #2a1a2a; color: #bb9af7; }

    /* ── Alerts ──────────────────────────────────────────────────────────────── */
    .alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; }
    .alert-error   { background: #2d1414; border: 1px solid #7f1d1d; color: var(--danger); }
    .alert-success { background: #14271a; border: 1px solid #166534; color: var(--success); }

    /* ── Empty state ─────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }
    .empty-state .es-icon { font-size: 40px; margin-bottom: 14px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── Modal ───────────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 440px;
      max-width: 95vw;
    }
    .modal h2 { font-size: 16px; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── Form ────────────────────────────────────────────────────────────────── */
    .form-grid { display: flex; flex-direction: column; gap: 14px; }
    label { display: flex; flex-direction: column; gap: 5px; font-size: 13px; color: var(--muted); }
    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 8px 12px;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 72px; }

    /* ── Capability Tree (Cytoscape) ─────────────────────────────────────────── */
    .cap-cy-wrap { position: relative; width: 100%; height: calc(100vh - 140px); min-height: 400px; }
    #cap-cy { width: 100%; height: 100%; background: var(--bg); }
    .cap-cy-controls {
      position: absolute; bottom: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 6px; z-index: 10;
    }
    .cap-cy-controls button {
      width: 32px; height: 32px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .cap-cy-controls button:hover { border-color: var(--accent); color: var(--accent); }
    .cap-cy-legend {
      position: absolute; bottom: 16px; left: 16px;
      display: flex; gap: 12px; z-index: 10;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px; font-size: 11px; color: var(--muted);
    }
    .cap-cy-legend span { display: flex; align-items: center; gap: 5px; }
    .cap-cy-legend i { display: inline-block; width: 14px; height: 14px; border-radius: 3px; }
    #cap-tooltip {
      position: fixed; display: none; z-index: 200; pointer-events: none;
      background: #1a1f2e; border: 1px solid #2d3748;
      border-radius: 8px; padding: 12px 14px; max-width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    #cap-tooltip .tt-name { font-weight: 600; color: var(--text); font-size: 13px; margin-bottom: 3px; }
    #cap-tooltip .tt-type { font-size: 11px; color: #e0af68; margin-bottom: 8px; }
    #cap-tooltip .tt-apps-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
    #cap-tooltip .tt-app { font-size: 11px; color: #7aa2f7; padding: 2px 0; }

    /* ── Misc ────────────────────────────────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: flex; align-items: center; gap: 10px; color: var(--muted); padding: 24px 0; }
    .divider { height: 1px; background: var(--border); margin: 8px 0; }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav>
    <a class="nav-logo" href="#/">
      <svg width="22" height="22" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <polygon points="16,2 27,8 27,22 16,28 5,22 5,8" fill="#E85D3A"/>
        <polygon points="16,9 22,13 22,21 16,25 10,21 10,13" fill="none" stroke="white" stroke-width="0.8" stroke-linejoin="round" opacity="0.4"/>
        <circle cx="16" cy="16" r="2.5" fill="white"/>
        <line x1="16" y1="13.5" x2="16" y2="9" stroke="white" stroke-width="1" opacity="0.7"/>
        <line x1="18" y1="14.5" x2="22" y2="13" stroke="white" stroke-width="1" opacity="0.7"/>
        <line x1="18" y1="17.5" x2="22" y2="21" stroke="white" stroke-width="1" opacity="0.7"/>
      </svg>
      <div class="nav-wordmark"><span class="w-archi">Archi</span><span class="w-pulse">Pulse</span></div>
    </a>
    <div class="nav-sep"></div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="nav-spacer"></div>
    <button class="btn btn-primary btn-sm" onclick="App.showCreateWs()">+ New workspace</button>
  </nav>

  <!-- App shell -->
  <div class="app-shell" id="shell">
    <!-- sidebar injected here when in workspace context -->
    <div id="content-wrap" style="flex:1;display:flex;flex-direction:column;">
      <div id="app" class="content-full">
        <div class="loading"><div class="spinner"></div> Loading…</div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)App.closeModal()">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Cytoscape tooltip (shared) -->
  <div id="cap-tooltip">
    <div class="tt-name"></div>
    <div class="tt-type"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
  <script>
  // ── API ──────────────────────────────────────────────────────────────────────
  const api = {
    async get(path) {
      const r = await fetch('/api/v1' + path);
      if (!r.ok) throw new Error((await r.json()).error || r.statusText);
      return r.json();
    },
    async post(path, body) {
      const r = await fetch('/api/v1' + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error((await r.json()).error || r.statusText);
      return r.json();
    },
    async upload(path, file) {
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch('/api/v1' + path, { method: 'POST', body: fd });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ error: r.statusText }));
        throw new Error(err.error || r.statusText);
      }
      return r.json();
    },
  };

  // ── View registry ────────────────────────────────────────────────────────────
  // Each view: { icon, label, desc, layer, graph? }
  const VIEWS = {
    'element-catalogue':      { icon: '◈', label: 'Element Catalogue',     desc: 'All elements across layers',             layer: 'cross' },
    'capability-tree':        { icon: '◈', label: 'Capability Tree',        desc: 'Business capability hierarchy',          layer: 'business', tree: true },
    'application-catalogue':  { icon: '◈', label: 'Application Catalogue',  desc: 'Application components',                 layer: 'application' },
    'application-landscape':  { icon: '◈', label: 'Application Landscape',  desc: 'Apps mapped to business processes',      layer: 'application' },
    'application-dependency': { icon: '◈', label: 'Dependency Graph',       desc: 'Interactive dependency graph',           layer: 'application', graph: true },
    'integration-map':        { icon: '⇄', label: 'Integration Map',        desc: 'Integration topology — services, components and data flows', layer: 'application', graph: true },
    'technology-catalogue':   { icon: '◈', label: 'Technology Catalogue',   desc: 'Infrastructure & technology elements',   layer: 'technology' },
  };

  const LAYER_GROUPS = [
    { key: 'cross',       label: 'Cross-cutting', dot: 'dot-cross' },
    { key: 'business',    label: 'Business',      dot: 'dot-biz'   },
    { key: 'application', label: 'Application',   dot: 'dot-app'   },
    { key: 'technology',  label: 'Technology',    dot: 'dot-tech'  },
  ];

  // ── Router ───────────────────────────────────────────────────────────────────
  const Router = {
    go(hash) { location.hash = hash; },
    parse() {
      const h = location.hash.replace(/^#\/?/, '') || '';
      const parts = h.split('/');
      if (!parts[0]) return { page: 'home' };
      if (parts[0] === 'ws' && parts[1]) {
        if (parts[2] === 'view' && parts[3]) {
          return { page: 'view', wsID: parts[1], view: parts.slice(3).join('/') };
        }
        return { page: 'workspace', wsID: parts[1] };
      }
      return { page: 'home' };
    },
  };

  // ── App ──────────────────────────────────────────────────────────────────────
  const App = {
    init() {
      window.addEventListener('hashchange', () => this.render());
      this.render();
    },

    async render() {
      const route = Router.parse();
      const app = document.getElementById('app');
      app.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';

      try {
        if (route.page === 'home') {
          this.removeSidebar();
          app.className = 'content-full';
          await this.renderHome(app);
        } else if (route.page === 'workspace') {
          app.className = 'content';
          const ws = await api.get('/workspaces/' + route.wsID);
          await this.ensureSidebar(ws, route.wsID, null);
          await this.renderWorkspace(app, ws, route.wsID);
        } else if (route.page === 'view') {
          app.className = 'content';
          const ws = await api.get('/workspaces/' + route.wsID);
          await this.ensureSidebar(ws, route.wsID, route.view);
          await this.renderView(app, ws, route.wsID, route.view);
        }
      } catch (e) {
        app.innerHTML = `<div class="alert alert-error" style="margin-top:24px">Error: ${esc(e.message)}</div>`;
      }
    },

    // ── Sidebar ───────────────────────────────────────────────────────────────
    removeSidebar() {
      const sb = document.getElementById('sidebar');
      if (sb) sb.remove();
      this.setBreadcrumb([]);
    },

    async ensureSidebar(ws, wsID, activeView) {
      let sb = document.getElementById('sidebar');
      const shell = document.getElementById('shell');

      if (!sb) {
        sb = document.createElement('aside');
        sb.id = 'sidebar';
        sb.className = 'sidebar';
        shell.insertBefore(sb, document.getElementById('content-wrap'));
      }

      // Build grouped view items
      const viewsHtml = LAYER_GROUPS.map(group => {
        const items = Object.entries(VIEWS)
          .filter(([, v]) => v.layer === group.key)
          .map(([key, v]) => {
            const target = v.graph ? `${key}/graph` : v.tree ? `${key}/tree` : key;
            const isActive = activeView === target || activeView === key;
            return `<div class="sidebar-item ${isActive ? 'active' : ''}"
              onclick="Router.go('/ws/${wsID}/view/${target}')">
              <span class="sidebar-layer-dot ${group.dot}"></span>
              ${esc(v.label)}
            </div>`;
          }).join('');
        if (!items) return '';
        return `<div class="sidebar-section">
          <div class="sidebar-section-label">${group.label}</div>
          ${items}
        </div>`;
      }).join('');

      sb.innerHTML = `
        <div class="sidebar-ws-header">
          <div class="sidebar-ws-name">${esc(ws.name)}</div>
          <span class="purpose-badge">${esc(ws.purpose)}</span>
        </div>
        <div class="sidebar-item ${!activeView ? 'active' : ''}" style="margin:8px 8px 0"
          onclick="Router.go('/ws/${wsID}')">
          <span class="si-icon">⌂</span> Overview
        </div>
        <div class="divider" style="margin:8px 8px 0"></div>
        ${viewsHtml}
        <div class="sidebar-footer">
          <div class="drop-zone" id="sb-drop-zone" onclick="document.getElementById('sb-file-input').click()" style="padding:14px">
            <div class="dz-icon">↑</div>
            <p>Import model</p>
            <div class="hint">.xml · .ajx · .json</div>
          </div>
          <input type="file" id="sb-file-input" accept=".xml,.ajx,.json" style="display:none"
            onchange="App.handleImport('${wsID}', this)">
          <div id="sb-import-result" style="margin-top:8px"></div>
        </div>`;

      this._setupDropZone(wsID);
      this.setBreadcrumb(ws, wsID, activeView);
    },

    _setupDropZone(wsID) {
      const zone = document.getElementById('sb-drop-zone');
      if (!zone) return;
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('over'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('over');
        const file = e.dataTransfer.files[0];
        if (file) this._doImport(wsID, file);
      });
    },

    handleImport(wsID, input) {
      const file = input.files[0];
      if (file) this._doImport(wsID, file);
    },

    async _doImport(wsID, file) {
      const result = document.getElementById('sb-import-result');
      if (result) result.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const data = await api.upload('/workspaces/' + wsID + '/import', file);
        if (result) result.innerHTML = `<div class="alert alert-success" style="font-size:12px">
          ✓ ${data.elements} elements · ${data.relationships} relationships</div>`;
        setTimeout(() => this.render(), 1400);
      } catch (e) {
        if (result) result.innerHTML = `<div class="alert alert-error" style="font-size:12px">✗ ${esc(e.message)}</div>`;
      }
    },

    setBreadcrumb(ws, wsID, activeView) {
      const bc = document.getElementById('breadcrumb');
      if (!ws) { bc.innerHTML = ''; return; }
      const parts = [
        `<a href="#/">Workspaces</a>`,
        `<span class="sep">/</span>`,
      ];
      if (activeView) {
        const viewKey = activeView.replace('/graph', '');
        const meta = VIEWS[viewKey];
        parts.push(`<a href="#/ws/${wsID}">${esc(ws.name)}</a>`);
        parts.push(`<span class="sep">/</span>`);
        parts.push(`<span class="current">${meta ? esc(meta.label) : esc(activeView)}</span>`);
      } else {
        parts.push(`<span class="current">${esc(ws.name)}</span>`);
      }
      bc.innerHTML = parts.join('');
    },

    // ── Home ──────────────────────────────────────────────────────────────────
    async renderHome(el) {
      this.setBreadcrumb(null);
      document.getElementById('breadcrumb').innerHTML = '<span style="color:var(--muted)">Workspaces</span>';
      const workspaces = await api.get('/workspaces');

      if (!workspaces || workspaces.length === 0) {
        el.innerHTML = `
          <div style="margin-bottom:28px">
            <h1 style="font-size:20px;font-weight:600">Workspaces</h1>
            <p style="color:var(--muted);margin-top:4px;font-size:13px">Your ArchiMate baselines</p>
          </div>
          <div class="empty-state">
            <div class="es-icon">🏛️</div>
            <p>No workspaces yet.<br>Create one and import your first ArchiMate model.</p>
            <br>
            <button class="btn btn-primary" onclick="App.showCreateWs()">+ New workspace</button>
          </div>`;
        return;
      }

      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1>Workspaces</h1>
            <div class="sub">${workspaces.length} baseline${workspaces.length !== 1 ? 's' : ''}</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="App.showCreateWs()">+ New workspace</button>
        </div>
        <div class="ws-grid">
          ${workspaces.map(ws => `
            <div class="ws-card" onclick="Router.go('/ws/${ws.id}')">
              <div class="ws-card-top">
                <h2>${esc(ws.name)}</h2>
                <span class="purpose-badge">${esc(ws.purpose)}</span>
              </div>
              <div class="desc">${esc(ws.description || 'No description')}</div>
              <div class="meta">
                Updated ${new Date(ws.updated_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}
              </div>
            </div>
          `).join('')}
        </div>`;
    },

    // ── Workspace overview ────────────────────────────────────────────────────
    async renderWorkspace(el, ws, wsID) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1>${esc(ws.name)}</h1>
            <div class="sub">${esc(ws.description || 'No description')}</div>
          </div>
        </div>
        <div class="loading"><div class="spinner"></div> Loading model stats…</div>`;

      // Fetch element catalogue to get counts
      let elements = 0, biz = 0, app = 0, tech = 0, mot = 0;
      try {
        const cat = await api.get('/workspaces/' + wsID + '/views/element-catalogue');
        const rows = cat.rows || [];
        elements = rows.length;
        rows.forEach(r => {
          const layer = r[0];
          if (layer === 'Business') biz++;
          else if (layer === 'Application') app++;
          else if (layer === 'Technology') tech++;
          else if (layer === 'Motivation') mot++;
        });
      } catch(_) {}

      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1>${esc(ws.name)}</h1>
            <div class="sub">${esc(ws.description || 'No description')}</div>
          </div>
        </div>

        ${elements === 0 ? `
        <div class="empty-state">
          <div class="es-icon">📭</div>
          <p>No model imported yet.<br>Use the import panel on the left to upload an AOEF or AJX file.</p>
        </div>` : `
        <div class="section-label">Model overview</div>
        <div class="overview-grid">
          <div class="overview-card">
            <div class="ov-label">Total elements</div>
            <div class="ov-value">${elements}</div>
          </div>
          <div class="overview-card">
            <div class="ov-label">Business</div>
            <div class="ov-value" style="color:#e0af68">${biz}</div>
          </div>
          <div class="overview-card">
            <div class="ov-label">Application</div>
            <div class="ov-value" style="color:#7aa2f7">${app}</div>
          </div>
          <div class="overview-card">
            <div class="ov-label">Technology</div>
            <div class="ov-value" style="color:#9ece6a">${tech}</div>
          </div>
          ${mot > 0 ? `<div class="overview-card">
            <div class="ov-label">Motivation</div>
            <div class="ov-value" style="color:#bb9af7">${mot}</div>
          </div>` : ''}
        </div>
        <div class="section-label" style="margin-top:8px">Available views</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px">
          ${Object.entries(VIEWS).map(([key, v]) => {
            const target = v.graph ? key + '/graph' : v.tree ? key + '/tree' : key;
            return `<div onclick="Router.go('/ws/${wsID}/view/${target}')"
              style="background:var(--surface);border:1px solid var(--border);border-radius:8px;
                     padding:14px 16px;cursor:pointer;transition:border-color .15s"
              onmouseover="this.style.borderColor='var(--accent)'"
              onmouseout="this.style.borderColor='var(--border)'">
              <div style="font-size:13px;font-weight:600;margin-bottom:3px">${esc(v.label)}</div>
              <div style="font-size:12px;color:var(--muted)">${esc(v.desc)}</div>
            </div>`;
          }).join('')}
        </div>`}`;
    },

    // ── View (table or graph) ─────────────────────────────────────────────────
    async renderView(el, ws, wsID, viewPath) {
      const isGraph = viewPath.endsWith('/graph');
      const isTree  = viewPath.endsWith('/tree');
      const viewKey = isGraph ? viewPath.replace('/graph', '')
                    : isTree  ? viewPath.replace('/tree', '')
                    : viewPath;
      const meta = VIEWS[viewKey] || { label: viewKey, desc: '' };

      if (isGraph)     await this.renderGraph(el, wsID, viewKey, meta);
      else if (isTree) await this.renderTree(el, wsID, viewKey, meta);
      else             await this.renderTable(el, wsID, viewKey, meta);
    },

    async renderTable(el, wsID, viewKey, meta) {
      const data = await api.get('/workspaces/' + wsID + '/views/' + viewKey);
      const rows = data.rows || [];
      const columns = data.columns || [];

      const layerTag = val => {
        const map = { Application: 'tag-app', Business: 'tag-biz', Technology: 'tag-tech', Motivation: 'tag-mot' };
        const cls = map[val] || '';
        return cls ? `<span class="tag ${cls}">${val}</span>` : esc(val);
      };
      const layerCols = new Set(['Layer', 'layer']);

      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1>${esc(meta.label)}</h1>
            <div class="sub">${rows.length} rows · ${esc(meta.desc)}</div>
          </div>
          <button class="btn btn-ghost btn-sm"
            onclick="App.exportCSV('${viewKey}', ${JSON.stringify(columns)}, ${JSON.stringify(rows)})">
            ↓ Export CSV
          </button>
        </div>
        ${rows.length === 0
          ? `<div class="empty-state"><div class="es-icon">📭</div><p>No data — import a model first.</p></div>`
          : `<div class="table-wrap">
              <table>
                <thead><tr>${columns.map(c => `<th>${esc(c)}</th>`).join('')}</tr></thead>
                <tbody>
                  ${rows.map(row => `<tr>${row.map((cell, i) => {
                    const col = columns[i];
                    const val = cell == null ? '' : String(cell);
                    return `<td>${layerCols.has(col) ? layerTag(val) : esc(val)}</td>`;
                  }).join('')}</tr>`).join('')}
                </tbody>
              </table>
            </div>`}`;
    },

    async renderGraph(el, wsID, viewKey, meta) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1>${esc(meta.label)}</h1>
            <div class="sub">${esc(meta.desc)}</div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" id="btn-fit">⊡ Fit</button>
            <button class="btn btn-ghost btn-sm" id="btn-layout">↺ Re-layout</button>
          </div>
        </div>
        <div id="cy"></div>
        <div style="margin-top:10px;color:var(--muted);font-size:11px">
          Scroll to zoom · Drag to pan · Click a node to highlight connections
        </div>`;

      const data = await api.get('/workspaces/' + wsID + '/views/' + viewKey + '/graph');

      if ((data.nodes || []).length === 0) {
        el.querySelector('#cy').outerHTML = `<div class="empty-state"><div class="es-icon">📭</div><p>No application elements — import a model first.</p></div>`;
        return;
      }

      const relColor = rel => {
        const r = (rel || '').toLowerCase();
        if (r.includes('serving'))     return '#7aa2f7';
        if (r.includes('triggering'))  return '#E85D3A';
        if (r.includes('flow'))        return '#9ece6a';
        if (r.includes('access'))      return '#bb9af7';
        if (r.includes('assignment'))  return '#e0af68';
        if (r.includes('association')) return '#6b7280';
        return '#3a3d55';
      };

      const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: [
          ...(data.nodes || []).map(n => ({ data: { id: n.id, label: n.label || n.name, layer: n.layer, nodeType: n.type } })),
          ...(data.edges || []).map(e => ({ data: { id: e.id, source: e.source, target: e.target, label: e.label || e.relationship, relColor: relColor(e.relationship) } })),
        ],
        style: [
          { selector: 'node', style: {
            label: 'data(label)', 'text-valign': 'bottom', 'text-halign': 'center',
            'font-size': '10px', color: '#e2e4f0', 'text-margin-y': '4px',
            width: 34, height: 34, 'background-color': '#555', 'border-width': 2, 'border-color': '#2a2d3e',
            'text-wrap': 'wrap', 'text-max-width': '100px',
          }},
          // Layer base colors
          { selector: 'node[layer="Application"]', style: { 'background-color': '#7aa2f7', 'border-color': '#3d59a1' }},
          { selector: 'node[layer="Business"]',    style: { 'background-color': '#e0af68', 'border-color': '#a87c36' }},
          { selector: 'node[layer="Technology"]',  style: { 'background-color': '#9ece6a', 'border-color': '#5a8a2a' }},
          { selector: 'node[layer="Motivation"]',  style: { 'background-color': '#bb9af7', 'border-color': '#7555a0' }},
          // Application sub-type overrides
          { selector: 'node[nodeType="ApplicationService"]',   style: { 'background-color': '#4a9eff', 'border-color': '#2a6abf', 'border-style': 'dashed' }},
          { selector: 'node[nodeType="ApplicationFunction"]',  style: { 'background-color': '#3a5a80', 'border-color': '#2a3a50' }},
          { selector: 'node[nodeType="ApplicationInterface"]', style: { 'background-color': '#3a9a9a', 'border-color': '#1a6a6a' }},
          { selector: 'node[nodeType="DataObject"]',           style: { 'background-color': '#7c5cbf', 'border-color': '#4a2a8a', width: 28, height: 28 }},
          { selector: 'edge', style: {
            width: 1.5, 'line-color': 'data(relColor)', 'target-arrow-color': 'data(relColor)',
            'target-arrow-shape': 'triangle', 'curve-style': 'bezier',
            'font-size': '9px', color: '#8b8fa8', label: 'data(label)',
            'text-rotation': 'autorotate', 'text-margin-y': '-6px',
            opacity: 0.8,
          }},
          { selector: ':selected', style: { 'border-color': '#fff', 'border-width': 3 }},
          { selector: '.faded',    style: { opacity: 0.12 }},
        ],
        layout: { name: 'cose', animate: false, padding: 40, nodeRepulsion: 8000 },
      });

      cy.on('tap', 'node', evt => {
        const n = evt.target;
        cy.elements().addClass('faded');
        n.removeClass('faded');
        n.neighborhood().removeClass('faded');
      });
      cy.on('tap', evt => { if (evt.target === cy) cy.elements().removeClass('faded'); });

      document.getElementById('btn-fit').onclick    = () => cy.fit(undefined, 40);
      document.getElementById('btn-layout').onclick = () => cy.layout({ name: 'cose', animate: true, padding: 40, nodeRepulsion: 8000 }).run();
    },

    // ── Capability Tree renderer (Cytoscape + dagre) ─────────────────────────
    async renderTree(el, wsID, viewKey, meta) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h1>${esc(meta.label)}</h1>
            <div class="sub">${esc(meta.desc)}</div>
          </div>
        </div>
        <div class="loading"><div class="spinner"></div> Loading…</div>`;

      const data = await api.get('/workspaces/' + wsID + '/views/capability-tree/tree');
      const nodes = data.nodes || [];

      if (nodes.length === 0) {
        el.querySelector('.loading').outerHTML = `<div class="empty-state"><div class="es-icon">◈</div><p>No Capability elements found.<br>Import or create elements with type <strong>Capability</strong>.</p></div>`;
        return;
      }

      el.querySelector('.loading').outerHTML = `
        <div class="cap-cy-wrap">
          <div id="cap-cy"></div>
          <div class="cap-cy-controls">
            <button id="cap-btn-fit" title="Fit">⊡</button>
            <button id="cap-btn-zoom-in" title="Zoom in">+</button>
            <button id="cap-btn-zoom-out" title="Zoom out">−</button>
          </div>
          <div class="cap-cy-legend">
            <span><i style="background:#2a2010;border:2px solid #e0af68"></i> Capability</span>
            <span><i style="background:#0d1f2e;border:2px solid #7aa2f7"></i> Component</span>
            <span><i style="background:#0d1a28;border:2px solid #4a9eff;border-style:dashed"></i> Service</span>
            <span><i style="background:#0d1520;border:1px solid #3a5a80"></i> Function</span>
          </div>
        </div>`;

      // Map ArchiMate app type → visual subtype
      const appSubtype = t => {
        if (!t) return 'other';
        if (t === 'ApplicationComponent') return 'component';
        if (t === 'ApplicationService')   return 'service';
        if (t === 'ApplicationFunction')  return 'function';
        if (t === 'ApplicationInterface') return 'interface';
        return 'other';
      };
      const appShortType = t => {
        if (!t) return '';
        return t.replace('Application', '').replace('Composite', '');
      };

      // Build Cytoscape elements
      const elems = [];
      const appNodesSeen = new Set();

      nodes.forEach(n => {
        elems.push({ data: { id: n.id, label: n.name, kind: 'capability', apps: n.supporting_apps || [] } });
        if (n.parent_id) {
          elems.push({ data: { id: 'e-' + n.parent_id + '-' + n.id, source: n.parent_id, target: n.id, kind: 'composition' } });
        }
        (n.supporting_apps || []).forEach(a => {
          if (!appNodesSeen.has(a.id)) {
            appNodesSeen.add(a.id);
            const sub = appSubtype(a.type);
            elems.push({ data: {
              id: 'app-' + a.id,
              label: a.name + '\n' + appShortType(a.type),
              kind: 'app', appType: a.type, appSub: sub,
            }});
          }
          elems.push({ data: { id: 'srv-' + n.id + '-' + a.id, source: 'app-' + a.id, target: n.id, kind: 'serving' } });
        });
      });

      const cy = cytoscape({
        container: document.getElementById('cap-cy'),
        elements: elems,
        style: [
          { selector: 'node', style: {
            shape: 'round-rectangle',
            label: 'data(label)',
            'text-valign': 'center', 'text-halign': 'center',
            'font-size': '12px', 'font-family': 'system-ui, sans-serif',
            color: '#e2e8f0',
            'text-wrap': 'wrap', 'text-max-width': '150px',
            width: 160, height: 44,
            padding: '10px',
          }},
          { selector: 'node[kind="capability"]', style: {
            'background-color': '#2a2010',
            'border-color': '#e0af68', 'border-width': 2,
            color: '#e0af68',
          }},
          // ApplicationComponent — primary, full-weight
          { selector: 'node[kind="app"][appSub="component"]', style: {
            'background-color': '#0d1f2e',
            'border-color': '#7aa2f7', 'border-width': 2,
            color: '#7aa2f7',
            width: 150, height: 44,
            'font-size': '11px',
          }},
          // ApplicationService — exposed service, lighter blue
          { selector: 'node[kind="app"][appSub="service"]', style: {
            'background-color': '#0d1a28',
            'border-color': '#4a9eff', 'border-width': 1.5,
            color: '#4a9eff',
            width: 140, height: 40,
            'font-size': '11px',
            'border-style': 'dashed',
          }},
          // ApplicationFunction — internal function, muted
          { selector: 'node[kind="app"][appSub="function"]', style: {
            'background-color': '#0d1520',
            'border-color': '#3a5a80', 'border-width': 1,
            color: '#5a80a8',
            width: 130, height: 38,
            'font-size': '10px',
          }},
          // ApplicationInterface — access point, teal-ish
          { selector: 'node[kind="app"][appSub="interface"]', style: {
            'background-color': '#0a1e20',
            'border-color': '#3a9a9a', 'border-width': 1.5,
            color: '#3a9a9a',
            width: 130, height: 38,
            'font-size': '10px',
          }},
          // Fallback for other app types
          { selector: 'node[kind="app"][appSub="other"]', style: {
            'background-color': '#111827',
            'border-color': '#4b5563', 'border-width': 1,
            color: '#6b7280',
            width: 130, height: 38,
            'font-size': '10px',
          }},
          { selector: 'node:selected', style: {
            'border-width': 3, 'border-color': '#fff',
          }},
          { selector: 'edge', style: {
            'curve-style': 'taxi',
            'taxi-direction': 'horizontal',
            width: 1.5, opacity: 0.6,
          }},
          { selector: 'edge[kind="composition"]', style: {
            'line-color': '#a87c36',
            'target-arrow-color': '#a87c36', 'target-arrow-shape': 'triangle',
          }},
          { selector: 'edge[kind="serving"]', style: {
            'line-color': '#4a6fa5',
            'line-style': 'dashed', 'line-dash-pattern': [5, 3],
            'target-arrow-color': '#4a6fa5', 'target-arrow-shape': 'triangle',
          }},
          { selector: '.faded', style: { opacity: 0.15 } },
        ],
        layout: {
          name: 'dagre',
          rankDir: 'LR',
          nodeSep: 30,
          rankSep: 100,
          align: 'UL',
          animate: false,
          padding: 40,
        },
        userZoomingEnabled: true,
        userPanningEnabled: true,
        boxSelectionEnabled: false,
      });

      // Tooltip
      const tt = document.getElementById('cap-tooltip');
      cy.on('mouseover', 'node', e => {
        const d = e.target.data();
        const apps = d.apps || [];
        const displayName = d.kind === 'app' ? d.label.split('\n')[0] : d.label;
        const typeColor = d.kind === 'capability' ? '#e0af68'
          : d.appSub === 'component' ? '#7aa2f7'
          : d.appSub === 'service'   ? '#4a9eff'
          : d.appSub === 'function'  ? '#5a80a8'
          : '#6b7280';
        tt.innerHTML = `
          <div class="tt-name">${esc(displayName)}</div>
          <div class="tt-type" style="color:${typeColor}">${d.kind === 'app' ? (d.appType || 'Application') : 'Capability'}</div>
          ${apps.length ? `<div class="tt-apps-label">Supported by</div>${apps.map(a => `<div class="tt-app">· ${esc(a.name)}</div>`).join('')}` : ''}`;
        tt.style.display = 'block';
      });
      cy.on('mousemove', e => {
        if (tt.style.display === 'none') return;
        tt.style.left = (e.originalEvent.clientX + 14) + 'px';
        tt.style.top  = (e.originalEvent.clientY - 10) + 'px';
      });
      cy.on('mouseout', 'node', () => { tt.style.display = 'none'; });

      // Highlight on click
      cy.on('tap', 'node', e => {
        cy.elements().addClass('faded');
        e.target.removeClass('faded');
        e.target.neighborhood().removeClass('faded');
      });
      cy.on('tap', e => { if (e.target === cy) cy.elements().removeClass('faded'); });

      // Controls
      document.getElementById('cap-btn-fit').onclick     = () => cy.fit(undefined, 40);
      document.getElementById('cap-btn-zoom-in').onclick  = () => cy.zoom({ level: cy.zoom() * 1.2, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
      document.getElementById('cap-btn-zoom-out').onclick = () => cy.zoom({ level: cy.zoom() / 1.2, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
    },

    // ── CSV export ────────────────────────────────────────────────────────────
    exportCSV(name, columns, rows) {
      const lines = [columns.join(',')];
      rows.forEach(r => lines.push(r.map(c => '"' + String(c ?? '').replace(/"/g, '""') + '"').join(',')));
      const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name + '.csv';
      a.click();
    },

    // ── Create workspace modal ────────────────────────────────────────────────
    showCreateWs() {
      document.getElementById('modal-content').innerHTML = `
        <h2>New workspace</h2>
        <div class="form-grid">
          <label>Name <input id="ws-name" placeholder="Q1-2026-AS-IS" /></label>
          <label>Purpose
            <select id="ws-purpose">
              <option value="as-is">as-is</option>
              <option value="to-be">to-be</option>
              <option value="migration">migration</option>
            </select>
          </label>
          <label>Description <textarea id="ws-desc" placeholder="Optional description"></textarea></label>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="App.closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="App.createWs()">Create</button>
        </div>
        <div id="modal-err"></div>`;
      document.getElementById('modal').style.display = 'flex';
      setTimeout(() => document.getElementById('ws-name').focus(), 50);
    },

    async createWs() {
      const name = document.getElementById('ws-name').value.trim();
      const purpose = document.getElementById('ws-purpose').value;
      const description = document.getElementById('ws-desc').value.trim();
      if (!name) {
        document.getElementById('modal-err').innerHTML = '<div class="alert alert-error" style="margin-top:12px">Name is required</div>';
        return;
      }
      try {
        const ws = await api.post('/workspaces', { name, purpose, description });
        this.closeModal();
        Router.go('/ws/' + ws.id);
      } catch (e) {
        document.getElementById('modal-err').innerHTML = `<div class="alert alert-error" style="margin-top:12px">${esc(e.message)}</div>`;
      }
    },

    closeModal() {
      document.getElementById('modal').style.display = 'none';
    },
  };

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  App.init();
  </script>
</body>
</html>
