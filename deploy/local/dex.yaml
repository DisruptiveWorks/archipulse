# Dex OIDC provider — local development config
# Works with both:
#   docker compose --profile oidc up
#   dex serve deploy/local/dex.yaml  (native binary, desde la raíz del repo)

issuer: http://localhost:5556/dex

storage:
  type: memory  # no database needed for local dev

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true
  # Emit groups claim in the ID token (required for role mapping).
  responseTypes:
    - code

# Static users — no external IdP needed.
# Passwords are bcrypt hashes. This one is "password".
enablePasswordDB: true
staticPasswords:
  - email: admin@archipulse.org
    hash: "$2y$10$pKCBClPi5ywZcAUi7ozwOuiRifX1PK0rQUZ8SZLCokqTOblUJrX6i"
    username: admin
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
  - email: viewer@archipulse.org
    hash: "$2y$10$pKCBClPi5ywZcAUi7ozwOuiRifX1PK0rQUZ8SZLCokqTOblUJrX6i"
    username: viewer
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5467"

staticClients:
  - id: archipulse-local
    secret: archipulse-local-secret
    name: ArchiPulse (local)
    redirectURIs:
      - http://localhost:8080/api/v1/auth/oidc/callback

# connectors: [] — using built-in password DB above.
# Note: Dex staticPasswords does not emit groups natively.
# For group-based role mapping in local dev, use OIDC_ROLES_CLAIM=email
# and OIDC_ADMIN_VALUES=admin@archipulse.org in .env instead.
# In production with a real IdP (Keycloak, Azure AD, Google Workspace),
# set OIDC_ROLES_CLAIM=groups and configure groups in the IdP.
